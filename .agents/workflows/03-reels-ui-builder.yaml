name: build-reels-ui  
description: Generates the interactive, mobile-first Reels UI consuming the tagged content.  
workflow_pattern: sequential_pipeline  
assigned_persona: creative_ui_ux_engineer

execution_pipeline:  
  - step: PROJECT_SCAFFOLDING  
    instruction: "Ignore old website references. Initialize Next.js component directory. Implement Tailwind CSS configuration optimized for Mobile-first."  
    
  - step: LAYOUT_ARCHITECTURE  
    instruction: "Create the master ReelContainer. Ensure CSS Scroll Snapping is enabled to support smooth swiping between individual learning cards."  
    
  - step: DATA_HYDRATION_ENGINE  
    instruction: "Develop a fetch mechanism that reads the JSON structures from 'app_build/content_data/lessons/'. Ensure components are strictly Dumb Components receiving the JSON bites as React Props."  
    
  - step: ANIMATION_BINDING  
    instruction: "Design a Framer Motion system that maps the 'visual_trigger_id' strings found in the JSON to their corresponding functional SVG/Canvas animation components."  
      
  - step: LOCAL_SIMULATION  
    instruction: "Run the local server in app_build/ for visual simulation and emit task completion signal."
