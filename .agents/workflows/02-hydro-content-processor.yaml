name: process-hydro-content  
description: Analyze, edit, and tag hydrotherapy learning materials into UI-agnostic JSON.  
workflow_pattern: sequential_pipeline  
assigned_persona: clinical_content_director

execution_pipeline:  
  - step: INGESTION  
    instruction: "Trigger Zotero or PubMed MCP to retrieve peer-reviewed validation for physical principles (e.g., Pascal's law, thermodynamics at 34 degrees)."  
    
  - step: DISTILLATION  
    instruction: "Filter the raw academic text. Edit and adapt it specifically for CP, MS, or orthopedic rehabilitation contexts. Break the text into short, Bite-Sized pieces (Max 40 words per piece)."  
    
  - step: SEMANTIC_TAGGING  
    instruction: "Assign structural JSON tags to the content. Include a descriptive title, engaging text, and critically, a 'visual_trigger_id' (e.g., 'pressure_gradient_arrows') intended to command the UI agent."  
    
  - step: ISOLATED_PERSISTENCE  
    instruction: "Save the final output exclusively as a pure JSON file inside 'app_build/content_data/lessons/'. Halt execution immediately if any HTML or CSS leaks into the output."
